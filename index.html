<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสมัครเข้าใช้งานระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #e5e4d7;
            /* สีพื้นหลังโทนกากีอ่อน */
        }

        .form-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            border: 1px solid #d1d5db;
            outline: none;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        .form-input:hover {
            border-color: #a1a1aa;
            background-color: #ffffff;
        }

        .form-input:focus {
            border-color: #4b5320;
            /* สีเขียวทหาร */
            box-shadow: 0 0 0 3px rgba(75, 83, 32, 0.2);
            background-color: #ffffff;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #3f3f46;
            margin-bottom: 0.25rem;
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-5px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Staggered delays */
        .delay-100 {
            animation-delay: 100ms;
            opacity: 0;
        }

        .delay-200 {
            animation-delay: 200ms;
            opacity: 0;
        }

        .delay-300 {
            animation-delay: 300ms;
            opacity: 0;
        }

        .delay-400 {
            animation-delay: 400ms;
            opacity: 0;
        }

        .delay-500 {
            animation-delay: 500ms;
            opacity: 0;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div
        class="max-w-2xl w-full bg-white rounded-lg shadow-xl overflow-hidden border-t-4 border-[#4b5320] animate-fade-in-up">
        <div class="bg-[#4b5320] p-6 text-white text-center">
            <!-- เปลี่ยนจากไอคอน lucide เป็นแท็ก img สำหรับแสดงโลโก้ -->
            <img src="Gemini_Generated_Image_5dsamg5dsamg5dsa-Photoroom.png" alt="โลโก้หน่วยงาน"
                class="h-28 w-auto mx-auto mb-3 animate-float drop-shadow-md object-contain"
                onerror="this.onerror=null; this.src='https://via.placeholder.com/112x112?text=Logo';">

            <h2 class="text-2xl font-bold tracking-wide">ลงทะเบียนสมัครเข้าใช้งานระบบ</h2>
            <p class="text-[#e5e4d7] text-sm mt-1">กรุณากรอกข้อมูลของท่านให้ครบถ้วนเพื่อทำการลงทะเบียน</p>
        </div>

        <form id="registrationForm" class="p-6 md:p-8 space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in-up delay-100">
                <!-- 1. ยศ -->
                <div>
                    <label for="rank" class="form-label">ยศ</label>
                    <input type="text" id="rank" name="rank" required class="form-input" placeholder="นาย, ส.อ., ร.ต.">
                </div>

                <!-- 2. ชื่อ -->
                <div>
                    <label for="firstName" class="form-label">ชื่อ</label>
                    <input type="text" id="firstName" name="firstName" required class="form-input"
                        placeholder="ชื่อจริง">
                </div>

                <!-- 3. สกุล -->
                <div>
                    <label for="lastName" class="form-label">สกุล</label>
                    <input type="text" id="lastName" name="lastName" required class="form-input" placeholder="นามสกุล">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in-up delay-200">
                <!-- 4. สังกัด -->
                <div>
                    <label for="affiliation" class="form-label">สังกัด</label>
                    <input type="text" id="affiliation" name="affiliation" required class="form-input"
                        placeholder="ระบุสังกัดของท่าน">
                </div>

                <!-- 5. หน่วย -->
                <div>
                    <label for="unit" class="form-label">หน่วย</label>
                    <input type="text" id="unit" name="unit" required class="form-input" placeholder="ระบุหน่วยงาน">
                </div>
            </div>

            <!-- 6. ตำแหน่ง และ ตำแหน่งในสนาม -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in-up delay-300">
                <div>
                    <label for="position" class="form-label">ตำแหน่ง (การทำงาน)</label>
                    <input type="text" id="position" name="position" required class="form-input"
                        placeholder="ตำแหน่งปัจจุบัน">
                </div>
                <div>
                    <label for="fieldPosition" class="form-label">ตำแหน่งในสนาม</label>
                    <input type="text" id="fieldPosition" name="fieldPosition" required class="form-input"
                        placeholder="ระบุตำแหน่งในสนาม">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in-up delay-400">
                <!-- 7. line -->
                <div>
                    <label for="lineId" class="form-label">Line ID</label>
                    <input type="text" id="lineId" name="lineId" class="form-input" placeholder="ไอดีไลน์">
                </div>

                <!-- 8. เบอร์โทร -->
                <div>
                    <label for="phone" class="form-label">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" name="phone" required class="form-input" placeholder="08X-XXX-XXXX">
                </div>

                <!-- 9. อีเมล -->
                <div>
                    <label for="email" class="form-label">อีเมล</label>
                    <input type="email" id="email" name="email" required class="form-input"
                        placeholder="example@email.com">
                </div>
            </div>

            <!-- แสดงสถานะ -->
            <div id="statusMessage" class="hidden rounded-md p-4 mt-4 text-sm text-center"></div>

            <div class="pt-4 animate-fade-in-up delay-500">
                <button type="submit" id="submitBtn"
                    class="w-full bg-[#4b5320] hover:bg-[#3a4018] text-white font-semibold py-3 px-4 rounded transition-all duration-300 hover:shadow-lg hover:-translate-y-1 active:scale-95 flex items-center justify-center shadow-md">
                    <i data-lucide="send" class="w-5 h-5 mr-2"></i>
                    <span>ส่งข้อมูลลงทะเบียน</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        lucide.createIcons();

        // =========================================================================
        // สำคัญ: นำ URL ที่ได้จาก Google Apps Script มาวางในเครื่องหมายคำพูดด้านล่างนี้
        // ตัวอย่าง: const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycb.../exec';
        // =========================================================================
        const GOOGLE_SCRIPT_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMWHqdl0wX8O0Mzj2HxhAs82FJZF4AMumLQze7votx0FG3v8r4ZQgFkDvVdZ0fFNPVRQFhBv5nSFu5jiqgPVm5hbaUXFJCS70Su_LyLD--WN9UcrhgkACnFldj6S7G2Qv7FRHy_U6hcpviqgbS3drILwok5ThCXcC1dStOp-MyCxRZ7FPZ_HAcIKVIOFrUv0u6zDsB259UsWIk18uuU8FMn4akmh8c6H01z1HWSHbrCI8CTvLZjHTi_4qJZQOctii-_wKtNNWCV8EDC3orLtC703kXhq5g&lib=M2sSgHMH0CpGCs2ZPYrLnsUnMMHei8RHb';

        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // แจ้งเตือนหากลืมใส่ URL
            if (GOOGLE_SCRIPT_URL === 'https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMWHqdl0wX8O0Mzj2HxhAs82FJZF4AMumLQze7votx0FG3v8r4ZQgFkDvVdZ0fFNPVRQFhBv5nSFu5jiqgPVm5hbaUXFJCS70Su_LyLD--WN9UcrhgkACnFldj6S7G2Qv7FRHy_U6hcpviqgbS3drILwok5ThCXcC1dStOp-MyCxRZ7FPZ_HAcIKVIOFrUv0u6zDsB259UsWIk18uuU8FMn4akmh8c6H01z1HWSHbrCI8CTvLZjHTi_4qJZQOctii-_wKtNNWCV8EDC3orLtC703kXhq5g&lib=M2sSgHMH0CpGCs2ZPYrLnsUnMMHei8RHb' || GOOGLE_SCRIPT_URL === '') {
                showStatus('⚠️ กรุณานำ URL จาก Google Apps Script มาใส่ในไฟล์ HTML บรรทัดที่ 146 ก่อนอัปโหลด', 'error');
                return;
            }

            // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 mr-2 animate-spin"></i><span>กำลังบันทึกข้อมูล...</span>';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            lucide.createIcons();
            statusMessage.classList.add('hidden');

            try {
                const formData = new FormData(form);
                // แปลงข้อมูลให้อยู่ในรูปแบบ URL-encoded ที่ Google Apps Script อ่านได้แม่นยำที่สุด
                const data = new URLSearchParams(formData);

                // ส่งข้อมูล
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: data
                });

                const result = await response.json();

                if (result.result === 'success') {
                    showStatus('✅ ลงทะเบียนสำเร็จ ข้อมูลของคุณถูกส่งเข้าระบบเรียบร้อยแล้ว', 'success');
                    form.reset(); // ล้างฟอร์ม
                } else {
                    throw new Error(result.error || 'ระบบไม่สามารถประมวลผลได้');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง', 'error');
            } finally {
                // คืนค่าปุ่ม
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                lucide.createIcons();
            }
        });

        function showStatus(message, type) {
            statusMessage.innerText = message;
            statusMessage.className = `p-4 mt-4 text-sm text-center rounded-md font-medium whitespace-pre-line ${type === 'success' ? 'bg-green-100 text-green-800 border border-green-300' : 'bg-red-100 text-red-800 border border-red-300'
                }`;
            statusMessage.classList.remove('hidden');
        }
    </script>
</body>

</html>
